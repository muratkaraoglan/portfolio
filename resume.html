<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Murat Karaoğlan - Resume</title>

<link
href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap"
rel="stylesheet">

<style>

:root {
 --primary:#f97316;
 --secondary:#ef4444;
 --bg:#18120b;
 --card:#2a1f16;
 --text:#fef3f2;
 --border:#44403c;
 --text-secondary: #fca5a5;
}


*{
 box-sizing:border-box;
}


body{
 margin:0;
 font-family:"Space Grotesk",sans-serif;
 background:var(--bg);
 color:var(--text);
 overflow-x:hidden;
}

body::before{
 content:'';
 position:fixed;
 inset:0;

 background:
 radial-gradient(circle at 20% 30%, rgba(249,115,22,.15), transparent 40%),
 radial-gradient(circle at 80% 70%, rgba(239,68,68,.12), transparent 40%);

 z-index:-2;
 animation:bgMove 20s infinite ease-in-out;
}


body::after{
 content:'';

 position:fixed;
 inset:0;

 background-image:
 linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
 linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);

 background-size:50px 50px;

 z-index:-1;
}



@keyframes bgMove{

0%,100%{
transform:scale(1);
}

50%{
transform:scale(1.1);
}

}


.navbar{

position:fixed;
top:0;
left:0;
right:0;

height:80px;

display:flex;
align-items:center;

background:rgba(15,23,42,.75);
backdrop-filter:blur(20px);

border-bottom:1px solid var(--border);

z-index:1000;

padding:0 40px;

transition:.3s ease;

}


.logo{
 font-size:28px;
 font-weight:700;
 background:linear-gradient(135deg,var(--primary),var(--secondary));
 -webkit-background-clip:text;
 color:transparent;
}


a{
 color:#fca5a5;
 text-decoration:none;
}


.nav-links{
 position:absolute;
 left:50%;
 transform:translateX(-50%);
 display:flex;
 gap:30px;
 list-style:none;
}

.nav-links a {
         color: var(--text-secondary);
         text-decoration: none;
         font-weight: 500;
         transition: color 0.3s ease;
         position: relative;
      }

      .nav-links a::after {
         content: '';
         position: absolute;
         bottom: -5px;
         left: 0;
         width: 0;
         height: 2px;
         background: linear-gradient(90deg, var(--primary), var(--secondary));
         transition: width 0.3s ease;
      }

      .nav-links a:hover { color: var(--text-primary); }
      .nav-links a:hover::after { width: 100%; }



.container{

max-width:1200px;
margin:auto;

padding:130px 30px 60px;

}


.title{
 text-align:center;
 margin-bottom:40px;
}


.title h1{
 font-size:3rem;
}


.highlight{
 background:linear-gradient(135deg,var(--primary),var(--secondary));
 -webkit-background-clip:text;
 color:transparent;
}


.resume-box{

background:var(--card);

border:1px solid var(--border);

border-radius:25px;

padding:25px;

transition:.4s ease;

animation:fadeUp .8s ease forwards;

}

.resume-box:hover{

transform:translateY(-8px);

border-color:var(--primary);

box-shadow:
0 20px 60px rgba(249,115,22,.25);

}


iframe{

width:100%;
height:900px;
border:none;
border-radius:15px;
background:white;

}


.download{

margin-top:25px;
display:flex;
justify-content:center;

}


.btn{

display:inline-flex;
align-items:center;
gap:10px;

padding:14px 25px;

border-radius:12px;

background:
linear-gradient(135deg,var(--primary),var(--secondary));

color:white;

font-weight:600;

transition:.3s ease;

}


.btn:hover{

transform:translateY(-4px);

box-shadow:
0 10px 30px rgba(249,115,22,.4);

}


@media(max-width:700px){

.nav-links{
display:none;
}

.title h1{
font-size:2rem;
}


iframe{
height:650px;
}

}

@keyframes fadeUp{

from{

opacity:0;
transform:translateY(30px);

}


to{

opacity:1;
transform:translateY(0);

}

}

</style>

</head>


<body>


<nav class="navbar">

<div class="logo">
MK
</div>


<ul class="nav-links">

<li><a href="index.html">Home</a></li>
<li><a href="index.html#projects">Projects</a></li>
<li><a href="index.html#media">Media</a></li>
<li><a href="resume.html">Resume</a></li>

</ul>

</nav>



<div class="container">


<div class="title">

<h1>
My <span class="highlight">Resume</span>
</h1>

<p>
Game Developer & Computer Engineer
</p>

</div>



<div class="resume-box">


<iframe
src="assets/Murat_Karaoglan_CV.pdf">
</iframe>



<div class="download">

<a 
class="btn"
href="assets/Murat_Karaoglan_CV.pdf"
target="_blank">

Download PDF

</a>

</div>


</div>


</div>


</body>

</html>
